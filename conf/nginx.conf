worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # HTTP server (port 8087)
    server {
        listen 8087;
        server_name localhost;
        client_max_body_size 50m;

        location / {
            root /home/hata/projects/hata-ui;
            try_files $uri $uri/ /index.html;
            index index.html index.htm;
        }

        location /profile/ {
            add_header 'Access-Control-Allow-Origin' '*';
            alias /home/hata/uploadPath/;
        }

        location /dataset/ {
            alias /etc/nginx/dataset/;
            add_header Expires 0;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        location /dev-api/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://hata-server:9099/;
        }

        location /prod-api/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://hata-server:9099/;
        }
    }

    # HTTPS server (port 8085)
    server {
        listen 8085 ssl;
        server_name localhost;

        ssl_certificate self-sign.cer;
        ssl_certificate_key private.key;

        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 5m;

        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            root /home/hata/projects/hata-ui;
            try_files $uri $uri/ /index.html;
            index index.html index.htm;
        }

        location /youtu-graphrag/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://61.169.215.186:10027/;
        }

        location /profile/ {
            # 跨域
            add_header 'Access-Control-Allow-Origin' '*';
            # 方式二：指向目录，对应后台`application.yml`中的`profile`配置
            alias /home/hata/uploadPath/;
        }
        location /dataset/ {
            alias /etc/nginx/dataset/;
            add_header Expires 0;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            
            # 核心：强制浏览器下载文件，而非预览
            # 使用 $uri 而不是 $request_uri，并提取文件名
            if ($uri ~ "/dataset/(.*)") {
                set $filename $1;
            }
            
            # 处理中文文件名编码
            add_header Content-Disposition "attachment; filename*=UTF-8''$filename";
        }

        location /static_files/ {
            alias /etc/nginx/static_files/;
            add_header Expires 0;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache"; 
        }

        location /prod-api/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://hata-server:9099/;
        }

        # location /stage-api/ {
